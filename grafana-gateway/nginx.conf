events {}

http {
    # Docker può assegnare un nuovo IP ai container quando vengono ricreati.
    # `resolve` evita che il gateway conservi l'indirizzo precedente fino al
    # proprio riavvio, rendendo backend e Grafana raggiungibili stabilmente.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream smartback_backend {
        zone smartback_backend 64k;
        server backend:8000 resolve;
    }

    upstream smartback_grafana {
        zone smartback_grafana 64k;
        server grafana:3000 resolve;
    }

    server {
        listen 8080;
        server_name _;
        absolute_redirect off;

        location = / {
            return 302 /smartback/;
        }

        location = /smartback/ {
            proxy_pass http://smartback_backend/smartback/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        # Il router SPA di Grafana può anteporre il proprio subpath ai link
        # assoluti definiti nelle dashboard.
        location = /grafana/smartback/ {
            proxy_pass http://smartback_backend/smartback/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location = /grafana/smartback {
            return 302 /smartback/;
        }

        location = /grafana-login {
            proxy_pass http://smartback_backend/grafana-login;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /smartback-assets/ {
            proxy_pass http://smartback_backend/smartback-assets/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Cache-Control;
            # Evita che un 404 transitorio durante la ricreazione del backend
            # lasci il logo rotto nella Home fino alla scadenza della cache.
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location ^~ /smartback-static/ {
            proxy_pass http://smartback_backend/smartback-static/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-cache" always;
        }

        location = /grafana-logout {
            proxy_pass http://smartback_backend/grafana-logout;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /grafana-calibration {
            proxy_pass http://smartback_backend/grafana-calibration;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Il router client di Grafana antepone automaticamente il proprio
        # subpath ai link dei pannelli Text.
        location = /grafana/grafana-calibration {
            proxy_pass http://smartback_backend/grafana-calibration;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location = /api/v1/grafana/login {
            proxy_pass http://smartback_backend/api/v1/grafana/login;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/grafana/logout {
            proxy_pass http://smartback_backend/api/v1/grafana/logout;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/grafana/ {
            proxy_pass http://smartback_backend/api/v1/grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        # I pulsanti Canvas trasformano gli endpoint assoluti aggiungendo il
        # subpath configurato di Grafana. Inoltra quindi anche questa variante
        # al backend, invece di lasciarla arrivare al server Grafana.
        location ^~ /grafana/api/v1/grafana/patients/ {
            proxy_pass http://smartback_backend/api/v1/grafana/patients/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location = /grafana/api/user/auth-tokens/rotate {
            proxy_pass http://smartback_backend/api/v1/grafana/token-rotation;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location = /_grafana_auth {
            internal;
            proxy_pass http://smartback_backend/api/v1/grafana/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # Gli asset frontend non contengono dati clinici e devono restare
        # disponibili anche mentre il backend di autenticazione si riavvia.
        # In caso contrario il browser può memorizzare il redirect di login
        # come risposta a un file JavaScript e mostrare la pagina di errore.
        location ^~ /grafana/public/ {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
            # L'immagine `latest` può cambiare i bundle tra due riavvii. Non
            # accettare risposte 304 basate su una copia Safari precedente,
            # che farebbero scattare il loop `chunkNotFound=true`.
            proxy_set_header If-None-Match "";
            proxy_set_header If-Modified-Since "";
            proxy_hide_header ETag;
            proxy_hide_header Last-Modified;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            proxy_pass http://smartback_grafana;
        }

        location /grafana/ {
            auth_request /_grafana_auth;
            error_page 401 403 = @grafana_login_redirect;

            # Grafana non espone colori per i link della dashboard. Inietta
            # uno stile ristretto alle quattro destinazioni SmartBack e HOME.
            # Il controller esterno forza HOME come navigazione completa:
            # altrimenti il router SPA di Grafana mostra la propria pagina 404.
            proxy_set_header Accept-Encoding "";
            sub_filter_once on;
            sub_filter '</head>' '<style id="smartback-navigation-colors">
              a[href*="/smartback/"]{background:#ffffff!important;border-color:#ffffff!important;color:#111827!important}
              a[href*="/d/smartback-overview/"],a[href*="/d/smartback-history/"]{background:#f2c94c!important;border-color:#f2c94c!important;color:#171717!important}
              a[href*="/d/smartback-night/"],a[href*="/d/smartback-night-history/"]{background:#234f8f!important;border-color:#234f8f!important;color:#ffffff!important}
              a[href*="/smartback/"] *,a[href*="/d/smartback-overview/"] *,a[href*="/d/smartback-history/"] *{color:#171717!important}
              a[href*="/d/smartback-night/"] *,a[href*="/d/smartback-night-history/"] *{color:#ffffff!important}
            </style>
            <script src="/smartback-static/grafana-navigation.js?v=2" defer></script>
            </head>';

            auth_request_set $auth_user $upstream_http_x_webauth_user;
            auth_request_set $auth_name $upstream_http_x_webauth_name;
            proxy_set_header X-WEBAUTH-USER $auth_user;
            proxy_set_header X-WEBAUTH-NAME $auth_name;

            # Grafana è autenticato esclusivamente tramite gli header SmartBack.
            # Un vecchio cookie grafana_session fa tentare al client una
            # rotazione token che risponde 401 e riavvia l'app all'infinito.
            proxy_set_header Cookie "";
            proxy_hide_header Set-Cookie;
            add_header Set-Cookie "grafana_session=; Max-Age=0; Path=/; HttpOnly; SameSite=Lax" always;
            add_header Set-Cookie "grafana_session=; Max-Age=0; Path=/grafana; HttpOnly; SameSite=Lax" always;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_pass http://smartback_grafana;
        }

        location @grafana_login_redirect {
            return 302 /grafana-login;
        }
    }
}
