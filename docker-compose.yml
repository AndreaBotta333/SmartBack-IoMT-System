name: smartback

x-influx-env: &influx-env
  INFLUXDB_URL: http://influxdb:8086
  INFLUXDB_ORG: ${INFLUXDB_ORG}
  INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
  INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartback-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - smartback-mosquitto-data:/mosquitto/data
      - smartback-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: smartback-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - smartback-influxdb-data:/var/lib/influxdb2
      - smartback-influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  nodered:
    image: nodered/node-red:latest
    container_name: smartback-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      <<: *influx-env
      FLOWS: flows.json
      SMARTSHIRT_PATIENT_ID: ${SMARTSHIRT_PATIENT_ID:-patient-demo-001}
      SIMULATOR_DEVICE_ID: ${SIMULATOR_DEVICE_ID:-tshirt-sim-001}
    volumes:
      - ./nodered/smartback:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: smartback-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./mobile/app/assets:/app/assets:ro
      - smartback-backend-data:/app/data
    environment:
      <<: *influx-env
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_POSTURE_TOPIC: smartback/normalized/posture
      MQTT_DEVICE_TOPIC: smartback/normalized/device
      MQTT_ALERT_TOPIC: smartback/alerts/posture
      POSTURE_EMA_ALPHA: ${POSTURE_EMA_ALPHA:-0.5}
      POSTURE_HYSTERESIS_DEG: ${POSTURE_HYSTERESIS_DEG:-2}
      DATA_STALE_SECONDS: ${DATA_STALE_SECONDS:-10}
      MODERATE_DEVIATION_DEG: ${MODERATE_DEVIATION_DEG:-10}
      MARKED_DEVIATION_DEG: ${MARKED_DEVIATION_DEG:-20}
      MODERATE_ROLL_DEG: ${MODERATE_ROLL_DEG:-10}
      MARKED_ROLL_DEG: ${MARKED_ROLL_DEG:-20}
      MEDICAL_REGISTRATION_CODE: ${MEDICAL_REGISTRATION_CODE:-SMARTBACK-MED-2026}
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-smartback-dev-password}
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  simulator:
    profiles: ["simulation"]
    build: ./simulator
    container_name: smartback-simulator
    # Evita dati sintetici dopo il riavvio di Docker quando si usa la maglia reale.
    restart: "no"
    volumes:
      - ./simulator:/app:ro
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      # Le maglie simulate vengono registrate dalla Home e attivate via MQTT.
      # DEVICE_ID resta solo come compatibilita opzionale con il simulatore singolo.
      DEVICE_ID: ${SIMULATOR_DEVICE_ID:-}
      SIMULATION_SCENARIO: ${SIMULATION_SCENARIO:-day-cycle}
      SAMPLING_FREQUENCY_HZ: ${SIMULATOR_SAMPLING_FREQUENCY_HZ:-25}
      SAMPLES_PER_PACKET: ${SIMULATOR_SAMPLES_PER_PACKET:-16}
      BATTERY_INTERVAL_SECONDS: ${SIMULATOR_BATTERY_INTERVAL_SECONDS:-30}
      SIMULATION_SEED: ${SIMULATION_SEED:-20260717}
      DROP_EVERY_N_PACKETS: ${SIMULATOR_DROP_EVERY_N_PACKETS:-0}
      REPORT_DATALOSS_ON_DROP: ${SIMULATOR_REPORT_DATALOSS_ON_DROP:-true}
    depends_on:
      mosquitto:
        condition: service_healthy

  grafana:
    # Versione fissata: `latest` può cambiare i bundle frontend a un riavvio
    # e lasciare il browser in un loop `chunkNotFound=true`.
    image: grafana/grafana:13.0.0
    container_name: smartback-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: email
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      # La sessione viene già verificata dal gateway SmartBack a ogni richiesta.
      # Il login token Grafana genererebbe un ciclo di rotazione 401 nel client.
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_AUTH_PROXY_SYNC_TTL: "60"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_EXPLORE_ENABLED: "false"
      # Consente ai pannelli Text di usare link HTML stilizzati. I contenuti
      # sono dashboard provisionate e non modificabili dagli utenti Viewer.
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-http://localhost:3000/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: ${GRAFANA_SIGNOUT_URL:-http://localhost:3000/grafana-logout}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - smartback-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy

  grafana-gateway:
    image: nginx:1.27-alpine
    container_name: smartback-grafana-gateway
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./grafana-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      grafana:
        condition: service_started

  mobile:
    profiles: ["mobile"]
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: smartback-mobile
    working_dir: /workspace/app
    volumes:
      - ./mobile/app:/workspace/app
      - smartback-mobile-node-modules:/workspace/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-localhost}
      EXPO_PUBLIC_API_URL: http://${HOST_IP:-localhost}:${API_PORT:-8000}
      EXPO_PUBLIC_WS_URL: ws://${HOST_IP:-localhost}:${API_PORT:-8000}/ws/wearable
    command: sleep infinity
    stdin_open: true
    tty: true

volumes:
  smartback-mosquitto-data:
  smartback-mosquitto-log:
  smartback-influxdb-data:
  smartback-influxdb-config:
  smartback-grafana-data:
  smartback-mobile-node-modules:
  smartback-backend-data:
