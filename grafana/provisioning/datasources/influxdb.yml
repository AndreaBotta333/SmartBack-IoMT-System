apiVersion: 1

deleteDatasources:
  - name: SmartBack InfluxDB
    orgId: 1

datasources:
  - name: SmartBack InfluxDB
    uid: smartback-influx
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
      tlsSkipVerify: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
